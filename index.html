<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: sans-serif;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;

      /* Keep image true to original */
      background: url("banner.jpg") no-repeat center center;
      background-size: cover;

      /* very subtle enhancement (optional) */
      filter: brightness(1.05) contrast(1.05);
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 30px 40px;
      border-radius: 10px;

      /* localized overlay only behind text */
      background: linear-gradient(
        rgba(0,0,0,0.5),
        rgba(0,0,0,0.2)
      );

      backdrop-filter: blur(2px); /* optional premium effect */
      max-width: 90%;
    }

    h1 {
      font-size: clamp(28px, 6vw, 48px);
      margin: 0;
    }

    p {
      font-size: clamp(14px, 4vw, 18px);
      margin-top: 10px;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      border: 1px solid white;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    .button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="content">
    <h1>洞察時序 · 穩如磐石</h1>
    <p>MARKET PULSE. ENDURING FOUNDATION.</p>

    <a href="#" class="button">Coming Soon</a>
  </div>

</body>
</html>
