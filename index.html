<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon!</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;

      /* Background image */
      background: url("Banner.png") no-repeat center center;
      background-size: cover;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .logo img {
      width: 120px;
      height: auto;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      body {
        background-position: 65% center;
      }

      .logo img {
        width: 90px;
      }

      .logo {
        top: 15px;
        left: 15px;
      }
    }
  </style>
</head>

<body>

  <!-- ADD YOUR LOGO FILE HERE -->
  <div class="logo">
    <img src="sq.png" alt="Logo">
  </div>

</body>
</html>
