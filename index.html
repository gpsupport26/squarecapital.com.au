<!DOCTYPE html>
<html>
<head>
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
      text-align: center;

      /* Background image */
      background: url("banner.png") no-repeat center center fixed;
      background-size: cover;
    }

    /* Optional dark overlay for readability */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    p {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="content">
    <p>Our website is under construction.</p>
  </div>

</body>
</html>
