<!DOCTYPE html>
<html>
<head>
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;

      /* IMPORTANT: replace this with a direct image link */
      background: url("banner.png") no-repeat center center fixed;
      background-size: cover;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    p {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="content">
    <h1>🚀 Coming Soon</h1>
    <p>Our website is under construction.</p>
  </div>

</body>
</html>
