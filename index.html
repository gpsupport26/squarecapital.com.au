<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon!</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Background layer */
    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)),
        url("bg.jpg") center / cover no-repeat;
      z-index: -1;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .logo img {
      width: 120px;
      height: auto;
    }

    /* Mobile version */
    @media (max-width: 768px) {
      .bg {
        background:
          linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)),
          url("bgm.jpg") center / cover no-repeat;
      }

      .logo {
        top: 15px;
        left: 15px;
      }

      .logo img {
        width: 90px;
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Logo -->
  <div class="logo">
    <img src="sq.png" alt="Logo">
  </div>

</body>
</html>
